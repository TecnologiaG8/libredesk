services:
  app:
    image: libredesk/libredesk:latest
    restart: unless-stopped
    environment:
      LIBREDESK_SYSTEM_USER_PASSWORD: ${LIBREDESK_SYSTEM_USER_PASSWORD:-}
    networks:
      - libredesk
      - coolify
    depends_on:
      - db
      - redis
    volumes:
      - ./uploads:/libredesk/uploads:rw
      - ./config.toml:/libredesk/config.toml
    command: [sh, -c, "./libredesk --install --idempotent-install --yes --config /libredesk/config.toml && ./libredesk --upgrade --yes --config /libredesk/config.toml && ./libredesk --config /libredesk/config.toml"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.libredesk.rule=Host(`helpdesk.ecotecbrasil.com.br`)"
      - "traefik.http.routers.libredesk.entrypoints=websecure"
      - "traefik.http.routers.libredesk.tls.certresolver=letsencrypt"
      - "traefik.http.services.libredesk.loadbalancer.server.port=9000"
      - "traefik.docker.network=coolify"

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    networks:
      - libredesk
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-libredesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-libredesk}
      POSTGRES_DB: ${POSTGRES_DB:-libredesk}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-libredesk} -d ${POSTGRES_DB:-libredesk}"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - libredesk
    volumes:
      - redis-data:/data

networks:
  libredesk:
  coolify:
    external: true

volumes:
  postgres-data:
  redis-data:
